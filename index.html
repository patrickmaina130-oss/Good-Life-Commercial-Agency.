<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Good Life Commercial Agencies</title>

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Tailwind CSS CDN -->
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme:{
extend:{
colors:{
primary:"#0A2342",
secondary:"#D4AF37",
accent:"#F8F9FA"
}
}
}
}
</script>

<link rel="stylesheet" href="css/style.css">

</head>

<body class="bg-primary text-white font-[Poppins]">

<!--==================================================
SECTION 1 : TOP BAR
===================================================-->

<div class="w-full bg-gradient-to-r from-blue-950 via-blue-900 to-blue-950 text-gray-100 text-sm">

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between px-4 py-2">

        <!-- Left -->
        <div class="flex flex-wrap items-center gap-4">

            <span class="flex items-center gap-2">
                📍 Nairobi, Kenya
            </span>

            <span class="hidden md:flex items-center gap-2">
                📞 +254 700 000 000
            </span>

            <span class="hidden lg:flex items-center gap-2">
                ✉️ info@goodlifecommercial.co.ke
            </span>

        </div>

        <!-- Right -->
        <div class="flex items-center gap-4 mt-2 md:mt-0">

            <span class="text-yellow-400 font-semibold animate-pulse">
                ★ Trusted Travel & Business Partner
            </span>

            <div class="flex gap-3 text-lg">

                <a href="#" class="hover:text-yellow-400 transition duration-300">Facebook</a>

                <a href="#" class="hover:text-yellow-400 transition duration-300">Instagram</a>

                <a href="#" class="hover:text-yellow-400 transition duration-300">WhatsApp</a>

            </div>

        </div>

    </div>

</div>
    
    <!--==================================================
SECTION 2 : PREMIUM NAVIGATION
===================================================-->

<header class="sticky top-0 z-50 bg-white/10 backdrop-blur-lg border-b border-white/20 shadow-lg">

    <div class="max-w-7xl mx-auto">

        <div class="flex items-center justify-between px-6 py-4">

            <!-- Logo -->
            <a href="#" class="flex items-center space-x-3">

                <div class="w-12 h-12 rounded-full bg-yellow-500 flex items-center justify-center text-blue-950 font-bold text-xl">
                    GL
                </div>

                <div>
                    <h1 class="text-xl font-bold text-white">
                        Good Life
                    </h1>

                    <p class="text-xs text-yellow-400">
                        Commercial Agencies
                    </p>
                </div>

            </a>

            <!-- Desktop Menu -->
            <nav class="hidden lg:flex items-center space-x-8">

                <a href="#" class="hover:text-yellow-400 transition duration-300">Home</a>

                <a href="#services" class="hover:text-yellow-400 transition duration-300">Services</a>

                <a href="#tours" class="hover:text-yellow-400 transition duration-300">Tours</a>

                <a href="#hotels" class="hover:text-yellow-400 transition duration-300">Hotels</a>

                <a href="#transport" class="hover:text-yellow-400 transition duration-300">Transport</a>

                <a href="#about" class="hover:text-yellow-400 transition duration-300">About</a>

                <a href="#contact" class="hover:text-yellow-400 transition duration-300">Contact</a>

            </nav>

            <!-- Right Side -->
            <div class="flex items-center space-x-4">

                <!-- Book Button -->
                <a href="#booking"
                   class="hidden md:inline-block bg-yellow-500 text-blue-950 px-6 py-2 rounded-full font-semibold hover:bg-yellow-400 transition duration-300">
                    Book Now
                </a>

                <!-- Mobile Menu Button -->
                <button id="menu-btn"
                        class="lg:hidden text-3xl text-white">
                    ☰
                </button>

            </div>

        </div>

        <!-- Mobile Menu -->
        <nav id="mobile-menu"
             class="hidden lg:hidden flex flex-col bg-blue-950 border-t border-white/20">

            <a href="#" class="px-6 py-4 hover:bg-blue-900">Home</a>

            <a href="#services" class="px-6 py-4 hover:bg-blue-900">Services</a>

            <a href="#tours" class="px-6 py-4 hover:bg-blue-900">Tours</a>

            <a href="#hotels" class="px-6 py-4 hover:bg-blue-900">Hotels</a>

            <a href="#transport" class="px-6 py-4 hover:bg-blue-900">Transport</a>

            <a href="#about" class="px-6 py-4 hover:bg-blue-900">About</a>

            <a href="#contact" class="px-6 py-4 hover:bg-blue-900">Contact</a>

        </nav>

    </div>

</header>

<script src="js/script.js"></script>

</body>
</html>
